<!DOCTYPE html>

<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>M7 Play</title>

<style>

/* BODY */

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
overflow-x:hidden;
}

/* LANGUAGE MENU */

.language-menu{
position:absolute;
top:20px;
right:20px;
z-index:20;
}

.lang-btn{
background:#111;
border:1px solid #d4af37;
color:#d4af37;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.lang-dropdown{
display:none;
position:absolute;
right:0;
margin-top:5px;
background:#111;
border:1px solid #d4af37;
border-radius:6px;
overflow:hidden;
min-width:150px;
}

.lang-dropdown div{
padding:10px;
cursor:pointer;
border-bottom:1px solid #333;
}

.lang-dropdown div:hover{
background:#d4af37;
color:black;
}

.language-menu:hover .lang-dropdown{
display:block;
}

/* BTC BACKGROUND */

.coins{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:-1;
}

.coin{
position:absolute;
width:32px;
opacity:0.8;
animation:btcFall linear infinite;
}

@keyframes btcFall{

0%{transform:translateY(-120px) rotate(0deg);opacity:0;}
10%{opacity:1;}
50%{transform:translateY(50vh) rotate(360deg);}
100%{transform:translateY(110vh) rotate(720deg);opacity:0;}

}

/* LOGO */

.logo{
background:black;
padding:15px;
}

/* HEADER */

.header{
padding:120px 20px;
background:linear-gradient(180deg,#000,#111);
position:relative;
}

.header h1{
font-size:52px;
color:#d4af37;
margin:10px 0;
}

/* BUTTON */

.btn{
background:#d4af37;
color:black;
padding:15px 35px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
margin:10px;
box-shadow:0 0 15px #d4af37;
display:inline-block;
}

/* SLOT */

.slot{
padding:60px 20px;
background:#111;
font-size:40px;
}

/* GAMES */

.games{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:50px;
}

.game{
background:#151515;
padding:25px;
width:150px;
border-radius:10px;
}

/* BONUS */

.bonus{
padding:70px;
background:linear-gradient(90deg,#000,#3a2a00);
}

/* JACKPOT */

.jackpot{
padding:60px 20px;
}

.jackpot h1{
font-size:55px;
margin:10px 0;
}

.mega{
color:#ffd700;
text-shadow:0 0 10px gold;
}

.major{
color:#3ea6ff;
text-shadow:0 0 8px #3ea6ff;
}

.minor{
color:#2ecc71;
text-shadow:0 0 8px #2ecc71;
}

/* VIP */

.vip{
padding:80px 20px;
}

.vip-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:30px;
}

.vip-box{
width:190px;
height:75px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:20px;
border-radius:14px;
transition:0.35s;
letter-spacing:1px;
cursor:pointer;
}

.classic{
color:#bfbfbf;
border:1px solid #777;
background:linear-gradient(145deg,#1b1b1b,#0d0d0d);
}

.silver{
color:#f0f0f0;
border:1px solid #c0c0c0;
background:linear-gradient(145deg,#8c8c8c,#d9d9d9);
}

.gold{
color:#ffd700;
border:1px solid #ffd700;
background:#111;
box-shadow:0 0 12px #ffd700;
}

.platinum{
color:#e6d9ff;
border:1px solid #a56cff;
background:#111;
box-shadow:0 0 16px #7d4cff;
}

.vip-box:hover{
transform:scale(1.08);
}

/* ABOUT */

.about{
padding:80px 20px;
background:#111;
max-width:900px;
margin:auto;
line-height:1.8;
}

/* PROVIDERS */

.providers{
padding:70px 0;
overflow:hidden;
background:#000;
}

.provider-track{
display:flex;
gap:25px;
width:max-content;
animation:scrollProviders 30s linear infinite;
}

.providers:hover .provider-track{
animation-play-state:paused;
}

@keyframes scrollProviders{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

.provider{
background:#000;
padding:15px;
border-radius:12px;
width:130px;
height:100px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border:1px solid #d4af37;
flex-shrink:0;
}

.provider img{
width:90px;
height:55px;
object-fit:contain;
margin-bottom:6px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
display:flex;
align-items:center;
gap:10px;
z-index:999;
animation:waFloat 2.5s infinite;
}

.whatsapp img{
width:60px;
height:60px;
border-radius:50%;
box-shadow:0 0 15px #25D366;
}

.wa-text{
background:#25D366;
color:white;
padding:8px 14px;
border-radius:20px;
font-size:14px;
font-weight:bold;
}

@keyframes waFloat{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* FOOTER */

.footer{
background:#111;
padding:40px;
color:#aaa;
}

</style>

</head>

<body>

<div class="coins" id="coins"></div>

<div class="logo">
<img src="logo.png" width="180">
</div>

<div class="header">

<div class="language-menu">

<button class="lang-btn">🌐 Language</button>

<div class="lang-dropdown">
<div onclick="setLang('ms')">🇲🇾 Bahasa</div>
<div onclick="setLang('zh')">🇨🇳 中文</div>
<div onclick="setLang('en')">🇬🇧 English</div>
</div>

</div>

<img src="banner.png" style="width:100%;max-width:900px;border-radius:12px;">

<h1 id="title">M7 Play</h1>

<p id="slogan">MENANG BESAR • MAIN BESAR • HIDUP MEWAH</p>

<a class="btn" id="registerBtn" href="register.html">DAFTAR SEKARANG</a>

</div>

<div class="slot" id="gamesTitle">
M7 JENIS PERMAINAN M7
</div>

<div class="bonus">

<h2 id="bonusTitle">WELCOME BONUS</h2>
<h1 style="color:#d4af37;">100% BONUS DEPOSIT</h1>

</div>

<div class="footer">

M7 Play © 2026

<p>Platform permainan selamat</p>
<p>Pengeluaran pantas</p>
<p>Sokongan pelanggan 24/7</p>

</div>

<script>

/* LANGUAGE SYSTEM */

const lang = {

ms:{
title:"M7 Play",
slogan:"MENANG BESAR • MAIN BESAR • HIDUP MEWAH",
register:"DAFTAR SEKARANG",
games:"M7 JENIS PERMAINAN M7",
bonus:"WELCOME BONUS"
},

zh:{
title:"M7 娱乐平台",
slogan:"大奖不断 • 娱乐无限 • 尊贵体验",
register:"立即注册",
games:"M7 游戏类型",
bonus:"欢迎奖金"
},

en:{
title:"M7 Play",
slogan:"BIG WIN • BIG PLAY • LUXURY LIFE",
register:"REGISTER NOW",
games:"M7 GAME TYPES",
bonus:"WELCOME BONUS"
}

}

function setLang(l){

localStorage.setItem("lang",l)

document.getElementById("title").innerText = lang[l].title
document.getElementById("slogan").innerText = lang[l].slogan
document.getElementById("registerBtn").innerText = lang[l].register
document.getElementById("gamesTitle").innerText = lang[l].games
document.getElementById("bonusTitle").innerText = lang[l].bonus

}

function detectLanguage(){

let saved = localStorage.getItem("lang")

if(saved){
setLang(saved)
return
}

let browserLang = navigator.language.toLowerCase()

if(browserLang.includes("zh")){
setLang("zh")
}
else if(browserLang.includes("ms") || browserLang.includes("id")){
setLang("ms")
}
else{
setLang("en")
}

}

window.onload = detectLanguage

</script>

</body>
</html>
