<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>M7 Register</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{

max-width:400px;
margin:auto;
padding:40px 20px;

}

h1{
color:#d4af37;
}

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:6px;
border:none;

background:#1a1a1a;
color:white;

font-size:16px;

}

button{

width:100%;
padding:15px;

background:#d4af37;
border:none;

font-weight:bold;
font-size:16px;

border-radius:6px;

margin-top:15px;

cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

<h1>M7 REGISTER</h1>

<input id="name" placeholder="NAMA">

<input id="phone" placeholder="NOMBOR TELEFON">

<input id="bank" placeholder="BANK">

<input id="acc" placeholder="AKAUN BANK">

<button onclick="send()">TERUSKAN</button>

</div>

<script>

function send(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let bank=document.getElementById("bank").value;
let acc=document.getElementById("acc").value;

let message =
"NEW M7 MEMBER REGISTER%0A%0A"+
"NAME: "+name+"%0A"+
"PHONE: "+phone+"%0A"+
"BANK: "+bank+"%0A"+
"BANK ACC: "+acc;

let url="https://wa.me/601139467029?text="+message;

window.location=url;

}

</script>

</body>
</html>
