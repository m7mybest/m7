<!DOCTYPE html>
<html lang="ms">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>M7 Register</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:400px;
margin:auto;
padding:40px 20px;
}

h1{
color:#d4af37;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
background:#1a1a1a;
color:white;
font-size:16px;
}

.phone-row{
display:flex;
gap:10px;
}

.phone-row select{
width:35%;
}

.phone-row input{
width:65%;
}

button{
width:100%;
padding:15px;
background:#d4af37;
border:none;
font-weight:bold;
font-size:16px;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.lang{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>

<span class="lang bm">M7 REGISTER</span>
<span class="lang en">M7 REGISTER</span>
<span class="lang cn">M7 注册</span>

</h1>

<!-- PHONE -->

<div class="phone-row">

<select id="code">

<option value="+60">🇲🇾 +60</option>
<option value="+65">🇸🇬 +65</option>
<option value="+62">🇮🇩 +62</option>
<option value="+66">🇹🇭 +66</option>

</select>

<input id="phone"

data-bm="NOMBOR FON"
data-en="PHONE NUMBER"
data-cn="手机号码"

placeholder="NOMBOR FON"

>

</div>

<!-- BANK -->

<select id="bank">

<option value=""
data-bm="PILIH BANK"
data-en="SELECT BANK"
data-cn="选择银行"
>PILIH BANK</option>

<option>AEON BANK</option>
<option>AFFIN BANK</option>
<option>AMBANK</option>
<option>BANK ISLAM</option>
<option>BANK RAKYAT</option>
<option>BIGPAY</option>
<option>BOOST</option>
<option>BOOST BANK</option>
<option>BSN</option>
<option>CIMB</option>
<option>GX BANK</option>
<option>HONG LEONG</option>
<option>MAYBANK</option>
<option>OCBC</option>
<option>PUBLIC BANK</option>
<option>RHB</option>
<option>TOUCH N GO</option>
<option>UOB</option>

</select>

<!-- NAME -->

<input id="name"

data-bm="NAMA AKAUN"
data-en="ACCOUNT NAME"
data-cn="账户姓名"

placeholder="NAMA AKAUN"

>

<!-- ACCOUNT -->

<input id="acc"

data-bm="AKAUN NOMBOR"
data-en="BANK ACCOUNT"
data-cn="银行账号"

placeholder="AKAUN NOMBOR"

>

<button onclick="send()">

<span class="lang bm">TERUSKAN</span>
<span class="lang en">CONTINUE</span>
<span class="lang cn">继续</span>

</button>

</div>

<script>

/* LANGUAGE */

function setLang(lang){

document.querySelectorAll(".lang").forEach(el=>{
el.style.display="none";
});

document.querySelectorAll("." + lang).forEach(el=>{
el.style.display="inline";
});

document.querySelectorAll("input").forEach(el=>{

let text=el.getAttribute("data-"+lang);

if(text){
el.placeholder=text;
}

});

document.querySelectorAll("option").forEach(el=>{

let text=el.getAttribute("data-"+lang);

if(text){
el.textContent=text;
}

});

}

let saved=localStorage.getItem("lang");

if(saved){
setLang(saved);
}else{
setLang("bm");
}


/* REGISTER */

function send(){

let phone=document.getElementById("phone").value.trim();
let code=document.getElementById("code").value;

let bank=document.getElementById("bank").value;
let name=document.getElementById("name").value.trim();
let acc=document.getElementById("acc").value.trim();

if(phone=="" || bank=="" || name=="" || acc==""){

alert("Please fill all information");

return;

}

if(phone.startsWith("0")){
phone=phone.substring(1);
}

let fullPhone=code+phone;

let message =
"NEW M7 MEMBER REGISTER%0A%0A"+
"PHONE: "+fullPhone+"%0A"+
"BANK: "+bank+"%0A"+
"ACCOUNT NAME: "+name+"%0A"+
"ACCOUNT NUMBER: "+acc;

let url="https://wa.me/601139467029?text="+message;

window.location=url;

}

</script>

</body>
</html>
