<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>M7 Register</title>

<style>

*{
box-sizing:border-box;
}

/* BODY */

body{

margin:0;

font-family:Arial;

color:white;

background:

linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1596838132731-3301c3fd4317");

background-size:cover;
background-position:center;

height:100vh;
width:100vw;

overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

position:fixed;

}

/* GOLD PARTICLES */

body:before{

content:"";

position:absolute;

width:200%;
height:200%;

background-image:radial-gradient(#d4af37 1px, transparent 1px);

background-size:40px 40px;

opacity:0.15;

animation:goldMove 40s linear infinite;

}

@keyframes goldMove{

from{transform:translateY(0)}
to{transform:translateY(-400px)}

}

/* REGISTER CARD */

.container{

width:92%;
max-width:420px;

padding:30px 22px;

background:rgba(0,0,0,0.75);

border-radius:16px;

box-shadow:

0 0 30px rgba(212,175,55,0.25),
0 0 80px rgba(0,0,0,0.9);

backdrop-filter:blur(12px);

position:relative;

}

/* TITLE */

h1{

color:#d4af37;

font-size:28px;

letter-spacing:3px;

margin-bottom:25px;

text-shadow:0 0 15px rgba(212,175,55,0.8);

}

/* INPUT */

input,select{

width:100%;

padding:13px;

margin:9px 0;

border-radius:8px;

border:1px solid rgba(212,175,55,0.3);

background:#141414;

color:white;

font-size:14px;

transition:0.3s;

}

input:focus,select:focus{

outline:none;

border:1px solid #d4af37;

box-shadow:0 0 10px rgba(212,175,55,0.7);

}

/* PHONE */

.phone-row{

display:flex;
gap:8px;

}

.phone-row select{

width:38%;

}

.phone-row input{

width:62%;

}

/* BUTTON */

button{

width:100%;

padding:15px;

margin-top:18px;

border:none;

border-radius:8px;

font-weight:bold;

font-size:15px;

cursor:pointer;

color:black;

background:linear-gradient(90deg,#d4af37,#f6e27a,#d4af37);

background-size:200%;

box-shadow:

0 0 15px rgba(212,175,55,0.7),
inset 0 0 10px rgba(255,255,255,0.4);

animation:goldShine 3s linear infinite;

}

@keyframes goldShine{

0%{background-position:0%}
100%{background-position:200%}

}

.lang{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>

<span class="lang bm">M7 REGISTER</span> <span class="lang en">M7 REGISTER</span> <span class="lang cn">M7 注册</span>

</h1>

<div class="phone-row">

<select id="code">

<option value="+60">🇲🇾 +60</option>
<option value="+65">🇸🇬 +65</option>
<option value="+62">🇮🇩 +62</option>
<option value="+66">🇹🇭 +66</option>
<option value="+86">🇨🇳 +86</option>

</select>

<input id="phone"

data-bm="NOMBOR FON"
data-en="PHONE NUMBER"
data-cn="手机号码"

placeholder="NOMBOR FON"

inputmode="numeric"

oninput="this.value=this.value.replace(/[^0-9]/g,'')"

>

</div>

<select id="bank">

<option value=""
data-bm="PILIH BANK"
data-en="SELECT BANK"
data-cn="选择银行"
>PILIH BANK</option>

<option>AEON BANK</option>
<option>AFFIN BANK</option>
<option>AMBANK</option>
<option>BANK ISLAM</option>
<option>BANK RAKYAT</option>
<option>BIGPAY</option>
<option>BOOST</option>
<option>BOOST BANK</option>
<option>BSN</option>
<option>CIMB</option>
<option>GX BANK</option>
<option>HONG LEONG</option>
<option>MAYBANK</option>
<option>OCBC</option>
<option>PUBLIC BANK</option>
<option>RHB</option>
<option>TOUCH N GO</option>
<option>UOB</option>

</select>

<input id="name"

data-bm="NAMA AKAUN"
data-en="ACCOUNT NAME"
data-cn="账户姓名"

placeholder="NAMA AKAUN"

oninput="this.value=this.value.replace(/[^a-zA-Z ]/g,'')"

>

<input id="acc"

data-bm="AKAUN NOMBOR"
data-en="BANK ACCOUNT"
data-cn="银行账号"

placeholder="AKAUN NOMBOR"

inputmode="numeric"

oninput="this.value=this.value.replace(/[^0-9]/g,'')"

>

<button onclick="send()">

<span class="lang bm">TERUSKAN</span> <span class="lang en">CONTINUE</span> <span class="lang cn">继续</span>

</button>

</div>

<script>

function setLang(lang){

document.querySelectorAll(".lang").forEach(el=>{
el.style.display="none";
});

document.querySelectorAll("." + lang).forEach(el=>{
el.style.display="inline";
});

document.querySelectorAll("input").forEach(el=>{
let text=el.getAttribute("data-"+lang);
if(text){
el.placeholder=text;
}
});

document.querySelectorAll("option").forEach(el=>{
let text=el.getAttribute("data-"+lang);
if(text){
el.textContent=text;
}
});

}

let saved=localStorage.getItem("lang");

if(saved){
setLang(saved);
}else{
setLang("bm");
}

function send(){

let phone=document.getElementById("phone").value.trim();
let code=document.getElementById("code").value;

let bank=document.getElementById("bank").value;
let name=document.getElementById("name").value.trim();
let acc=document.getElementById("acc").value.trim();

if(phone=="" || bank=="" || name=="" || acc==""){
alert("Please fill all information");
return;
}

if(phone.startsWith("0")){
phone=phone.substring(1);
}

let fullPhone=code+phone;

let message =
"NEW M7 MEMBER REGISTER%0A%0A"+
"PHONE: "+fullPhone+"%0A"+
"BANK: "+bank+"%0A"+
"ACCOUNT NAME: "+name+"%0A"+
"ACCOUNT NUMBER: "+acc;

let url="https://wa.me/601139467029?text="+message;

window.location=url;

}

</script>

</body>
</html>
